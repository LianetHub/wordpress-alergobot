<article class="article-related@@modifier">
    <a class="article-related__link" href="@@href">
        <div class="article-related__media">
            <img class="article-related__img" src="@@img" alt="" title="" width="295" height="277" loading="lazy">
        </div>
        <div class="article-related__body">
            <time class="article-related__date" datetime="@@datetime">@@date</time>
            <h3 class="article-related__title">@@title</h3>
            <p class="article-related__excerpt">@@excerpt</p>
            <span class="article-related__more">
                <span class="article-related__more-text article-related__more-text--desktop">Подробнее</span>
                <span class="article-related__more-text article-related__more-text--mobile">Читать статью</span>
                <span class="article-related__arrow" aria-hidden="true">
                    <img src="@img/article/arrow.svg" alt="" width="28" height="28">
                </span>
            </span>
        </div>
    </a>
</article>
