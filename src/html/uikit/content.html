<section class="uikit">
    <div class="uikit__container _container">
        <h1 class="uikit__title">UI Kit — Аллергоблот</h1>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Кнопка 1</h2>
            <div class="uikit__states">
                <div>
                    <p class="uikit__state-label">Default</p>
                    <a class="btn btn--primary" href="#">
                        Смотреть анализаторы
                        <svg class="btn__icon icon" width="28" height="28" aria-hidden="true"><use href="@img/icons.svg#icon-arrow-up-right"></use></svg>
                    </a>
                </div>
                <div>
                    <p class="uikit__state-label">Hover</p>
                    <a class="btn btn--primary is-hover-demo" href="#" tabindex="-1" aria-hidden="true">
                        Смотреть анализаторы
                        <svg class="btn__icon icon" width="28" height="28" aria-hidden="true"><use href="@img/icons.svg#icon-arrow-up-right"></use></svg>
                    </a>
                </div>
                <div>
                    <p class="uikit__state-label">Disable</p>
                    <button type="button" class="btn btn--primary" disabled>
                        Смотреть анализаторы
                        <svg class="btn__icon icon" width="28" height="28" aria-hidden="true"><use href="@img/icons.svg#icon-arrow-up-right"></use></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Кнопка 2</h2>
            <div class="uikit__row">
                <a class="btn btn--secondary" href="#">
                    Смотреть панели
                    <svg class="btn__icon icon" width="28" height="28" aria-hidden="true"><use href="@img/icons.svg#icon-arrow-up-right"></use></svg>
                </a>
                <button type="button" class="btn btn--secondary" disabled>
                    Смотреть панели
                    <svg class="btn__icon icon" width="28" height="28" aria-hidden="true"><use href="@img/icons.svg#icon-arrow-up-right"></use></svg>
                </button>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Кнопка 3</h2>
            <div class="uikit__panel">
                <button type="button" class="btn btn--ghost-light" data-fancybox data-src="#popup-presentation">Запросить презентацию</button>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Попапы</h2>
            <div class="uikit__panel uikit__panel--row">
                <button type="button" class="btn btn--secondary" data-fancybox data-src="#popup-consultation">Консультация</button>
                <button type="button" class="btn btn--secondary" data-fancybox data-src="#popup-order">Заказ</button>
                <button type="button" class="btn btn--secondary" data-fancybox data-src="#popup-presentation">Презентация</button>
                <button type="button" class="btn btn--secondary" data-fancybox data-src="#popup-partners">Партнёры</button>
                <button type="button" class="btn btn--secondary" data-fancybox data-src="#popup-success">Успех</button>
                <button type="button" class="btn btn--secondary" data-fancybox data-src="#popup-error">Ошибка</button>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Таб 1</h2>
            <div class="uikit__panel uikit__panel--tabs">
                <button type="button" class="tab" aria-expanded="false">
                    Описание
                    <svg class="tab__icon icon" width="36" height="36" aria-hidden="true"><use href="@img/icons.svg#icon-tab-plus"></use></svg>
                </button>
                <button type="button" class="tab tab--active" aria-selected="true" style="margin-top: 16px;">
                    Описание
                    <svg class="tab__icon icon" width="36" height="36" aria-hidden="true"><use href="@img/icons.svg#icon-tab-plus"></use></svg>
                </button>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Поле формы 1</h2>
            <div class="uikit__panel">
                <label class="form-field-wrap">
                    <span class="visually-hidden">Имя</span>
                    <input class="form-field" type="text" name="name" placeholder="Имя" autocomplete="name">
                </label>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Чекбокс 1</h2>
            <div class="uikit__panel" style="display: inline-flex; padding: 16px 20px;">
                <label class="checkbox">
                    <input class="checkbox__input" type="checkbox" name="demo">
                    <span class="checkbox__box">
                        <svg class="icon" width="20" height="20" aria-hidden="true"><use href="@img/icons.svg#icon-check"></use></svg>
                    </span>
                    <span class="checkbox__text">Текст</span>
                </label>
                <label class="checkbox" style="margin-left: 24px;">
                    <input class="checkbox__input" type="checkbox" name="demo2" checked>
                    <span class="checkbox__box">
                        <svg class="icon" width="20" height="20" aria-hidden="true"><use href="@img/icons.svg#icon-check"></use></svg>
                    </span>
                    <span class="checkbox__text">Текст</span>
                </label>
            </div>
        </div>

        <div class="uikit__section">
            <h2 class="uikit__section-title">Типографика</h2>
            <div class="uikit__typo-grid">
                <div>
                    <p class="uikit__typo-col-title">Desktop</p>
                    <div class="uikit__typo-stack">
                        <h1>H1</h1>
                        <h2>H2</h2>
                        <h3>H3</h3>
                        <p class="text-ui">Text — основной текст для абзацев и описаний.</p>
                        <p class="text-btn">Button</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
