<article class="product-related__card">
    <h3 class="product-related__title">@@title</h3>
    <div class="product-related__media">
        <img
            src="@@img"
            alt="@@alt"
            title="@@title"
            width="275"
            height="208"
            loading="lazy"
        >
    </div>
    <p class="product-related__text">@@text</p>
</article>
