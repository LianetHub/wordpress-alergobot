<div class="popup-modal__fields">
    <label class="popup-modal__field">
        <span class="visually-hidden">Имя</span>
        <input class="popup-modal__input" type="text" name="name" placeholder="Имя" autocomplete="name" required>
    </label>
    <label class="popup-modal__field">
        <span class="visually-hidden">Телефон</span>
        <input class="popup-modal__input" type="tel" name="phone" placeholder="+7 (" autocomplete="tel" required>
    </label>
    <label class="checkbox popup-modal__agree">
        <input class="checkbox__input" type="checkbox" name="agree" required>
        <span class="checkbox__box" aria-hidden="true">
            <svg class="icon" width="20" height="20">
                <use href="@img/icons.svg#icon-check"></use>
            </svg>
        </span>
        <span class="checkbox__text">
            Я даю согласие на <a href="politika-konfidentsialnosti.html">обработку персональных данных</a>
            и соглашаюсь с <a href="politika-konfidentsialnosti.html">политикой конфиденциальности</a>
        </span>
    </label>
</div>
