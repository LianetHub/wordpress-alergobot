<section class="faq">
    <div class="faq__container _container">
        <div class="faq__head">
            <span class="faq__tag tag">FAQ</span>
            <h2 class="faq__title title-md">@@faqTitle</h2>
        </div>

        <div class="faq__columns accordion" data-accordion>
            <div class="faq__col">
                @@loop('../templates/accordion-item.html', '@@faqCol1')
            </div>
            <div class="faq__col">
                @@loop('../templates/accordion-item.html', '@@faqCol2')
            </div>
        </div>
    </div>
</section>
