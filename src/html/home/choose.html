<section class="choose @@modifier">
    <div class="choose__container _container">
        <div class="choose__head">
            <div class="choose__head-main">
                <span class="tag tag--white choose__tag _anim-items a-scale-up">@@tag</span>
                <h2 class="choose__title title title-md title--light _anim-items a-blur-up">@@title</h2>
                <p class="choose__lead text-lead text-lead--light _anim-items a-fade-up">@@lead</p>
            </div>
            <p class="choose__note _anim-items a-fade-up">@@note</p>
        </div>
        <div class="choose__slider swiper _anim-items a-reveal">
            <div class="swiper-wrapper">
                @@loop('../templates/choose-slide.html', '@@slides')
            </div>
        </div>
        <div class="choose__footer _anim-items a-fade-up">
            <div class="choose__nav">
                <button class="choose__arrow choose__arrow--prev _anim-items a-scale-up" type="button" aria-label="Назад">
                    <svg width="32" height="32" aria-hidden="true">
                        <use href="@img/icons.svg#icon-arrow-chevron"></use>
                    </svg>
                </button>
                <button class="choose__arrow choose__arrow--next _anim-items a-scale-up" type="button" aria-label="Вперёд">
                    <svg width="32" height="32" aria-hidden="true">
                        <use href="@img/icons.svg#icon-arrow-chevron"></use>
                    </svg>
                </button>
            </div>
            <button class="choose__btn btn btn--white a-hover-lift" type="button" data-fancybox data-src="#popup-consultation">@@btnText</button>
        </div>
    </div>
</section>
