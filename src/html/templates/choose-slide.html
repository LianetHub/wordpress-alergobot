<div class="swiper-slide choose__slide">
    <article class="choose__card">
        <div class="choose__card-text">
            <h3 class="choose__card-title">@@title</h3>
            <p class="choose__card-desc">@@desc</p>
        </div>
        <div class="choose__card-media">
            <img class="cover-image" src="@@img" alt="@@alt" title="@@alt" width="214" height="256" loading="lazy">
        </div>
    </article>
</div>
