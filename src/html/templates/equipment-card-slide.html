<div class="swiper-slide equipment__slide">
    <article class="equipment__card">
        <a class="equipment__card-link" href="@@href" aria-label="@@ariaLabel">
            <h3 class="equipment__card-name @@nameClass">@@name</h3>
            <div class="equipment__card-media a-hover-zoom">
                <img class="cover-image" src="@@img" alt="@@alt" title="@@title" width="@@width" height="@@height" loading="lazy">
            </div>
            <p class="equipment__card-text">@@text</p>
        </a>
    </article>
</div>
