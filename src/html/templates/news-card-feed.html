<article class="news-card news-card--feed" data-animate="bottom">
    <a class="news-card__link" href="@@href">
        <div class="news-card__media">
            <img class="news-card__img" src="@@img" alt="@@alt" title="@@alt" width="295" height="278" loading="lazy">
        </div>
        <div class="news-card__body">
            <div class="news-card__meta">
                <span class="news-card__badge">@@badge</span>
                <time class="news-card__date news-card__date--pill" datetime="@@datetime">@@date</time>
            </div>
            <div class="news-card__text">
                <h3 class="news-card__title">@@title</h3>
                <p class="news-card__excerpt">@@excerpt</p>
            </div>
            <span class="news-card__more">
                <span class="news-card__more-label">Подробнее</span>
                <span class="news-card__more-icon" aria-hidden="true">
                    <svg class="icon" width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                        <use href="@img/icons.svg#icon-arrow-up-right"></use>
                    </svg>
                </span>
            </span>
        </div>
    </a>
</article>
