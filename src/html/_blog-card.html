<article class="blog-card">
    <a class="blog-card__link" href="@@href">
        <div class="blog-card__media">
            <img class="blog-card__img" src="@@img" alt="" title="" width="295" height="278" loading="lazy">
        </div>
        <div class="blog-card__content">
            <span class="blog-card__tag">@@tag</span>
            <time class="blog-card__date" datetime="@@datetime">@@date</time>
            <h3 class="blog-card__title">@@title</h3>
            <p class="blog-card__excerpt">@@excerpt</p>
            <span class="blog-card__more">
                <span class="blog-card__more-text blog-card__more-text--desktop">Подробнее</span>
                <span class="blog-card__more-text blog-card__more-text--mobile">Читать статью</span>
                <span class="blog-card__arrow" aria-hidden="true">
                    <svg class="icon" width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                        <use href="@img/icons.svg#icon-arrow-up-right"></use>
                    </svg>
                </span>
            </span>
        </div>
    </a>
</article>
