<li class="blog-recent__item">
    <a class="blog-recent__link" href="@@href">
        <img class="blog-recent__thumb" src="@@img" alt="" title="" width="104" height="104" loading="lazy">
        <span class="blog-recent__body">
            <span class="blog-recent__title">@@title</span>
            <time class="blog-recent__date" datetime="@@datetime">@@date</time>
        </span>
    </a>
</li>
